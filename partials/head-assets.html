  <!-- Critical CSS: minimal above-the-fold styles inlined to unblock first paint.
       Covers design tokens, body, container, header, mobile-nav button visibility,
       and a hero shell (navy fallback) so the page renders structured before the
       full stylesheet arrives. Full styles.min.css then loads non-blocking below. -->
  <style>
    :root{--primary:#1f3a5f;--secondary:#68A0BF;--alt:#4f6d8a;--accent:#C9A574;--accent-deep:#A0814D;--ink:#1a1a1a;--text:#2b2b2b;--bg:#F7F9F8;--surface:#fff;--border:#E5E3DD;--radius:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:24px;--s-6:32px;--s-7:40px;--s-9:72px;--s-10:96px;--font-heading:'utile','Helvetica Neue',Helvetica,Arial,sans-serif;--font-body:'utile-display','Helvetica Neue',Helvetica,Arial,sans-serif;--container:1240px;--header-h:80px}
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{margin:0;font-family:var(--font-body);font-size:16px;line-height:1.65;color:var(--text);background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .container{width:100%;max-width:var(--container);margin:0 auto;padding:0 var(--s-6)}
    @media (max-width:600px){.container{padding:0 var(--s-5)}}
    .skip-link{position:absolute;left:-9999px;top:0;background:var(--primary);color:#fff;padding:var(--s-3) var(--s-4);text-decoration:none;z-index:200}
    .skip-link:focus{left:var(--s-3);top:var(--s-3)}
    #site-header{height:var(--header-h);background:rgba(255,255,255,.85);-webkit-backdrop-filter:saturate(180%) blur(10px);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .header-inner{height:100%;display:flex;align-items:center;justify-content:space-between;gap:var(--s-5)}
    #site-header .logo img{height:46px;width:auto}
    #primary-nav .nav-list{list-style:none;margin:0;padding:0;display:flex;gap:var(--s-7);align-items:center}
    #primary-nav a{color:var(--ink);text-decoration:none;font-family:var(--font-heading);font-size:.8125rem;letter-spacing:.14em;text-transform:uppercase;padding:var(--s-2) 0}
    .nav-open,.nav-close{display:none;background:none;border:0;padding:var(--s-2);cursor:pointer;color:var(--text)}
    .nav-open{display:flex;flex-direction:column;gap:4px}
    .nav-open span{display:block;width:22px;height:1.5px;background:var(--text)}
    @media (min-width:901px){.nav-open{display:none}}
    @media (max-width:900px){#primary-nav{position:fixed;inset:0 0 0 auto;width:min(340px,88vw);background:var(--surface);transform:translateX(100%);padding:var(--s-9) var(--s-6)}#primary-nav .nav-list{display:block}}
    .btn{display:inline-block;padding:14px 28px;border-radius:var(--radius);font-family:var(--font-heading);font-size:.8125rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:1px solid transparent}
    .btn-dark{background:var(--accent);color:#fff;border-color:var(--accent)}
    #hero{position:relative;min-height:100svh;background-color:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
  </style>

  <!-- Main stylesheet loaded non-blocking (preload + onload swap) so the

  <link rel="preload" as="style" href="{{base}}css/styles.min.css?v=100" onload="this.onload=null;this.rel='stylesheet'">
